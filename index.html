<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        // Prevent infinite render if we crash during document.body load
        setTimeout(function() {
          var errorDiv = document.createElement('div');
          errorDiv.style.position = 'fixed';
          errorDiv.style.inset = '0';
          errorDiv.style.backgroundColor = '#1a0505';
          errorDiv.style.color = '#ff8888';
          errorDiv.style.padding = '30px';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.fontSize = '14px';
          errorDiv.style.overflow = 'auto';
          errorDiv.style.zIndex = '999999';
          errorDiv.innerHTML = [
            '<h2 style="color: #ff5555; margin-top: 0; border-bottom: 1px solid #ff555533; padding-bottom: 10px;">AQUARIUM RUNTIME CRASH</h2>',
            '<p><strong>Message:</strong> ' + message + '</p>',
            '<p><strong>Source:</strong> ' + source + '</p>',
            '<p><strong>Line:</strong> ' + lineno + ' | <strong>Column:</strong> ' + colno + '</p>',
            '<pre style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 6px; border: 1px solid #ff555522; margin-top: 20px; color: #ffaaaa;">' + 
              (error && error.stack ? error.stack : 'No stack trace available') + 
            '</pre>'
          ].join('');
          document.body.appendChild(errorDiv);
        }, 100);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
